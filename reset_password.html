<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClearOrbit &mdash; Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/styles/responsive.css"/>
    <style>
        *{box-sizing:border-box}
        body{background:linear-gradient(135deg,#F0EEFF 0%,#E8F0FE 40%,#F5F3FF 100%);font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh}
        .glass-card{background:rgba(255,255,255,.78);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.55);border-radius:1.25rem;box-shadow:0 8px 32px rgba(99,102,241,.08),0 1px 4px rgba(0,0,0,.04)}
        .gradient-text{background:linear-gradient(135deg,#6C5CE7,#4F46E5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .logo-icon{width:3rem;height:3rem;border-radius:1rem;background:linear-gradient(135deg,#6C5CE7,#4F46E5);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(108,92,231,.3)}
        .input-group{position:relative}
        .premium-input{width:100%;padding:.75rem 1rem .75rem 2.75rem;border:1px solid rgba(209,213,219,.5);border-radius:.875rem;font-size:.875rem;color:#111827;outline:none;transition:all .25s;background:rgba(255,255,255,.6);backdrop-filter:blur(8px)}
        .premium-input:focus{border-color:#6C5CE7;box-shadow:0 0 0 3px rgba(108,92,231,.12);background:#fff}
        .premium-input::placeholder{color:#9CA3AF}
        .btn-gradient{background:linear-gradient(135deg,#6C5CE7,#4F46E5);color:#fff;border:none;padding:.8125rem 1.5rem;border-radius:.875rem;font-size:.9375rem;font-weight:600;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 16px rgba(108,92,231,.3);width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn-gradient:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,92,231,.4)}
        .btn-gradient:active{transform:translateY(0)}
        .btn-gradient:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .alert-box{padding:.75rem 1rem;border-radius:.75rem;font-size:.8125rem;font-weight:500;display:none}
        .alert-error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
        .alert-success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
        .strength-bar{height:4px;border-radius:2px;background:#E5E7EB;overflow:hidden;transition:all .3s}
        .strength-fill{height:100%;border-radius:2px;transition:all .4s}
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="logo-icon mx-auto mb-3">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/></svg>
            </div>
            <h1 class="text-2xl font-bold gradient-text">Reset Password</h1>
        </div>

        <div class="glass-card overflow-hidden">
            <div id="loadingState" class="p-8 text-center">
                <svg class="animate-spin w-8 h-8 text-indigo-500 mx-auto mb-3" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <p class="text-gray-500 text-sm">Validating reset link...</p>
            </div>

            <div id="errorState" class="p-8 text-center" style="display:none">
                <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-5">
                    <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Invalid Link</h3>
                <p id="errorMessage" class="text-sm text-gray-500 mb-6"></p>
                <a href="/index.html" class="btn-gradient inline-flex" style="width:auto;padding:.6rem 1.5rem">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                    Back to Login
                </a>
            </div>

            <div id="formState" class="p-8" style="display:none">
                <div class="mb-6">
                    <h3 class="text-lg font-bold text-gray-900">Set New Password</h3>
                    <p class="text-sm text-gray-500 mt-1">Hi <span id="userName" class="font-semibold text-indigo-600"></span>, choose a strong new password.</p>
                </div>

                <div id="alert" class="alert-box alert-error mb-4"></div>

                <div class="mb-4">
                    <label class="block text-gray-600 text-xs font-semibold mb-2 uppercase tracking-wider">New Password</label>
                    <div class="input-group">
                        <input id="newPassword" type="password" placeholder="At least 6 characters" class="premium-input" oninput="checkStrength()" />
                        <svg style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                    <div class="mt-2 flex gap-1">
                        <div class="strength-bar flex-1"><div id="str1" class="strength-fill" style="width:0"></div></div>
                        <div class="strength-bar flex-1"><div id="str2" class="strength-fill" style="width:0"></div></div>
                        <div class="strength-bar flex-1"><div id="str3" class="strength-fill" style="width:0"></div></div>
                        <div class="strength-bar flex-1"><div id="str4" class="strength-fill" style="width:0"></div></div>
                    </div>
                    <p id="strengthLabel" class="text-xs mt-1 text-gray-400"></p>
                </div>

                <div class="mb-5">
                    <label class="block text-gray-600 text-xs font-semibold mb-2 uppercase tracking-wider">Confirm Password</label>
                    <div class="input-group">
                        <input id="confirmPassword" type="password" placeholder="Re-enter new password" class="premium-input" />
                        <svg style="position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    </div>
                </div>

                <button type="button" onclick="resetPassword()" id="resetBtn" class="btn-gradient">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    <span id="resetBtnText">Reset Password</span>
                    <svg id="resetSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </div>

            <div id="successState" class="p-8 text-center" style="display:none">
                <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-5">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Password Reset!</h3>
                <p class="text-sm text-gray-500 mb-6">Your password has been updated successfully.<br/>You can now log in with your new password.</p>
                <a href="/index.html" class="btn-gradient inline-flex" style="width:auto;padding:.6rem 1.5rem">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
                    Go to Login
                </a>
            </div>
        </div>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    async function init() {
        if (!token) {
            showError('No reset token provided. Please use the link from your email.');
            return;
        }
        try {
            const res = await fetch(`api/reset_password.php?token=${encodeURIComponent(token)}`);
            const data = await res.json();
            if (data.success) {
                document.getElementById('userName').textContent = data.name || data.username;
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('formState').style.display = '';
                document.getElementById('newPassword').focus();
            } else {
                showError(data.message);
            }
        } catch (e) {
            showError('Unable to validate reset link. Please try again.');
        }
    }

    function showError(msg) {
        document.getElementById('loadingState').style.display = 'none';
        document.getElementById('errorMessage').textContent = msg;
        document.getElementById('errorState').style.display = '';
    }

    function showAlert(msg, isError = true) {
        const el = document.getElementById('alert');
        el.textContent = msg;
        el.style.display = 'block';
        el.className = isError ? 'alert-box alert-error mb-4' : 'alert-box alert-success mb-4';
    }

    function checkStrength() {
        const pwd = document.getElementById('newPassword').value;
        let score = 0;
        if (pwd.length >= 6) score++;
        if (pwd.length >= 10) score++;
        if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
        if (/[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) score++;
        const colors = ['#EF4444','#F59E0B','#3B82F6','#10B981'];
        const labels = ['Weak','Fair','Good','Strong'];
        for (let i = 1; i <= 4; i++) {
            const el = document.getElementById('str' + i);
            if (i <= score) {
                el.style.width = '100%';
                el.style.background = colors[score - 1];
            } else {
                el.style.width = '0';
            }
        }
        document.getElementById('strengthLabel').textContent = pwd.length > 0 ? labels[score - 1] || '' : '';
    }

    async function resetPassword() {
        const password = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (password.length < 6) {
            showAlert('Password must be at least 6 characters.');
            return;
        }
        if (password !== confirm) {
            showAlert('Passwords do not match.');
            return;
        }

        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        document.getElementById('resetBtnText').textContent = 'Resetting...';
        document.getElementById('resetSpinner').classList.remove('hidden');

        try {
            const res = await fetch('api/reset_password.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password }),
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('formState').style.display = 'none';
                document.getElementById('successState').style.display = '';
            } else {
                showAlert(data.message);
            }
        } catch (e) {
            showAlert('Network error. Please try again.');
        } finally {
            btn.disabled = false;
            document.getElementById('resetBtnText').textContent = 'Reset Password';
            document.getElementById('resetSpinner').classList.add('hidden');
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.getElementById('formState').style.display !== 'none') {
            resetPassword();
        }
    });

    init();
</script>
</body>
</html>
