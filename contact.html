<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClearOrbit &mdash; Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/styles/responsive.css"/>
    <style>
        *{box-sizing:border-box}
        body{background:linear-gradient(135deg,#F0EEFF 0%,#E8F0FE 40%,#F5F3FF 100%);font-family:'Inter',system-ui,-apple-system,sans-serif;min-height:100vh}
        .glass-card{background:rgba(255,255,255,.78);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.55);border-radius:1.25rem;box-shadow:0 8px 32px rgba(99,102,241,.08),0 1px 4px rgba(0,0,0,.04)}
        .gradient-text{background:linear-gradient(135deg,#6C5CE7,#4F46E5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .logo-icon{width:3rem;height:3rem;border-radius:1rem;background:linear-gradient(135deg,#6C5CE7,#4F46E5);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(108,92,231,.3)}
        .premium-input{width:100%;padding:.75rem 1rem;border:1px solid rgba(209,213,219,.5);border-radius:.875rem;font-size:.875rem;color:#111827;outline:none;transition:all .25s;background:rgba(255,255,255,.6);backdrop-filter:blur(8px)}
        .premium-input:focus{border-color:#6C5CE7;box-shadow:0 0 0 3px rgba(108,92,231,.12);background:#fff}
        .premium-input::placeholder{color:#9CA3AF}
        textarea.premium-input{resize:vertical;min-height:120px}
        .btn-gradient{background:linear-gradient(135deg,#6C5CE7,#4F46E5);color:#fff;border:none;padding:.8125rem 1.5rem;border-radius:.875rem;font-size:.9375rem;font-weight:600;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 16px rgba(108,92,231,.3);width:100%;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn-gradient:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(108,92,231,.4)}
        .btn-gradient:disabled{opacity:.6;cursor:not-allowed;transform:none}
        .alert-box{padding:.75rem 1rem;border-radius:.75rem;font-size:.8125rem;font-weight:500;display:none}
        .alert-error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}
        .alert-success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0}
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="w-full max-w-lg">
        <div class="text-center mb-8">
            <a href="index.html" style="text-decoration:none">
                <div class="logo-icon mx-auto mb-3">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
                <h1 class="text-2xl font-bold gradient-text">Contact Us</h1>
                <p class="text-gray-500 text-sm mt-1">We'd love to hear from you</p>
            </a>
        </div>

        <div class="glass-card overflow-hidden">
            <div id="formState" class="p-8">
                <div id="alert" class="alert-box mb-4"></div>

                <div class="mb-4">
                    <label class="block text-gray-600 text-xs font-semibold mb-2 uppercase tracking-wider">Your Name *</label>
                    <input id="contactName" type="text" placeholder="John Doe" class="premium-input" />
                </div>

                <div class="mb-4">
                    <label class="block text-gray-600 text-xs font-semibold mb-2 uppercase tracking-wider">Email Address *</label>
                    <input id="contactEmail" type="email" placeholder="name@example.com" class="premium-input" />
                </div>

                <div class="mb-4">
                    <label class="block text-gray-600 text-xs font-semibold mb-2 uppercase tracking-wider">WhatsApp Number *</label>
                    <input id="contactWhatsApp" type="tel" placeholder="+923001234567" class="premium-input" />
                    <p class="text-xs text-gray-400 mt-1">International format required (e.g. +923001234567)</p>
                </div>

                <div class="mb-5">
                    <label class="block text-gray-600 text-xs font-semibold mb-2 uppercase tracking-wider">Message *</label>
                    <textarea id="contactMessage" placeholder="How can we help you?" class="premium-input"></textarea>
                </div>

                <button type="button" onclick="submitContact()" id="submitBtn" class="btn-gradient">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    <span id="submitBtnText">Send Message</span>
                    <svg id="submitSpinner" class="hidden animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </div>

            <div id="successState" class="p-8 text-center" style="display:none">
                <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-5">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-2">Message Sent!</h3>
                <p class="text-sm text-gray-500 mb-6">Thank you for reaching out. We'll get back to you as soon as possible.</p>
                <div class="flex gap-3 justify-center">
                    <button onclick="resetForm()" class="btn-gradient" style="width:auto;padding:.6rem 1.5rem">Send Another</button>
                    <a href="index.html" class="btn-gradient" style="width:auto;padding:.6rem 1.5rem;background:linear-gradient(135deg,#6B7280,#4B5563)">Back to Login</a>
                </div>
            </div>
        </div>

        <p class="text-center text-xs text-gray-400 mt-6">&copy; 2026 ClearOrbit. All rights reserved.</p>
    </div>

<script>
    function showAlert(msg, isError = true) {
        const el = document.getElementById('alert');
        el.textContent = msg;
        el.style.display = 'block';
        el.className = isError ? 'alert-box alert-error mb-4' : 'alert-box alert-success mb-4';
    }

    function resetForm() {
        document.getElementById('formState').style.display = '';
        document.getElementById('successState').style.display = 'none';
        document.getElementById('contactName').value = '';
        document.getElementById('contactEmail').value = '';
        document.getElementById('contactWhatsApp').value = '';
        document.getElementById('contactMessage').value = '';
        document.getElementById('alert').style.display = 'none';
    }

    async function submitContact() {
        const name = document.getElementById('contactName').value.trim();
        const email = document.getElementById('contactEmail').value.trim();
        const whatsapp = document.getElementById('contactWhatsApp').value.trim();
        const message = document.getElementById('contactMessage').value.trim();

        if (!name || !email || !whatsapp || !message) {
            showAlert('All fields are required including WhatsApp number.');
            return;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showAlert('Please enter a valid email address.');
            return;
        }
        if (!/^\+[1-9]\d{6,14}$/.test(whatsapp)) {
            showAlert('Please enter a valid WhatsApp number in international format (e.g. +923001234567).');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        document.getElementById('submitBtnText').textContent = 'Sending...';
        document.getElementById('submitSpinner').classList.remove('hidden');

        try {
            const res = await fetch('api/submit_contact.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, whatsapp_number: whatsapp, message }),
            });
            const data = await res.json();
            if (data.success) {
                document.getElementById('formState').style.display = 'none';
                document.getElementById('successState').style.display = '';
            } else {
                showAlert(data.message);
            }
        } catch (e) {
            showAlert('Network error. Please try again.');
        } finally {
            btn.disabled = false;
            document.getElementById('submitBtnText').textContent = 'Send Message';
            document.getElementById('submitSpinner').classList.add('hidden');
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && document.getElementById('formState').style.display !== 'none') {
            if (document.activeElement.tagName !== 'TEXTAREA') submitContact();
        }
    });
</script>
</body>
</html>
