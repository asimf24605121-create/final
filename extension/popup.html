<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 280px;
      background: #0f0f1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { width: 18px; height: 18px; }
    .title { font-size: 14px; font-weight: 700; color: #fff; }
    .subtitle { font-size: 10px; color: #64748b; margin-top: 1px; }
    .status-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.5);
      animation: pulse 2s infinite;
      flex-shrink: 0;
    }
    .status-dot.inactive { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
    .status-text { font-size: 12px; font-weight: 600; color: #22c55e; }
    .status-text.inactive { color: #ef4444; }
    .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 10px 0; }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 5px;
    }
    .info-value { color: #cbd5e1; font-weight: 500; }
    .info-value.update { color: #f59e0b; }
    .btn-row { display: flex; gap: 6px; margin-bottom: 10px; }
    .btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #94a3b8; }
    .btn-danger { background: rgba(239,68,68,0.15); color: #f87171; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; font-size: 11px; color: #94a3b8;
    }
    .toggle-label { display: flex; align-items: center; gap: 6px; }
    .toggle {
      width: 36px; height: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      padding: 0;
    }
    .toggle.active { background: #6366f1; }
    .toggle::after {
      content: '';
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px; left: 2px;
      transition: transform 0.2s;
    }
    .toggle.active::after { transform: translateX(16px); }
    .log-panel {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      max-height: 160px;
      overflow-y: auto;
      font-size: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      display: none;
      margin-bottom: 10px;
    }
    .log-panel.visible { display: block; }
    .log-entry {
      padding: 4px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      color: #94a3b8;
      line-height: 1.4;
      word-break: break-all;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-entry.warn { color: #f59e0b; }
    .log-entry.error { color: #f87171; }
    .log-entry .log-time { color: #475569; margin-right: 4px; }
    .log-entry .log-cat { color: #6366f1; margin-right: 4px; }
    .log-empty { padding: 16px; text-align: center; color: #475569; }
    .footer {
      text-align: center;
      font-size: 9px;
      color: #334155;
      margin-top: 8px;
    }
    .log-panel::-webkit-scrollbar { width: 4px; }
    .log-panel::-webkit-scrollbar-track { background: transparent; }
    .log-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg fill="none" stroke="white" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <div>
      <div class="title">ClearOrbit</div>
      <div class="subtitle">Secure Access Platform</div>
    </div>
  </div>

  <div class="status-card">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Connecting...</span>
    </div>
    <div class="divider"></div>
    <div class="info-row">
      <span>Version</span>
      <span class="info-value" id="versionText">2.1.0</span>
    </div>
    <div class="info-row">
      <span>Last Injection</span>
      <span class="info-value" id="lastInjection">None</span>
    </div>
    <div class="info-row">
      <span>Cookies Set</span>
      <span class="info-value" id="cookiesSet">0</span>
    </div>
    <div class="info-row">
      <span>Heartbeat</span>
      <span class="info-value" id="heartbeatStatus">Idle</span>
    </div>
    <div class="info-row">
      <span>Guard</span>
      <span class="info-value" id="guardStatus" style="color:#22c55e">Active</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" id="syncBtn">Force Sync</button>
    <button class="btn btn-secondary" id="toggleLogsBtn">View Logs</button>
  </div>

  <div class="log-panel" id="logPanel">
    <div class="log-empty" id="logEmpty">No logs recorded</div>
  </div>

  <div class="toggle-row">
    <span class="toggle-label">
      <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
      Debug Mode
    </span>
    <button class="toggle" id="debugToggle" aria-label="Toggle debug mode"></button>
  </div>

  <div class="btn-row" id="logActions" style="display:none">
    <button class="btn btn-secondary" id="refreshLogsBtn" style="flex:1">Refresh</button>
    <button class="btn btn-danger" id="clearLogsBtn" style="flex:1">Clear Logs</button>
  </div>

  <div class="footer">ClearOrbit v<span id="footerVersion">2.1.0</span> &copy; 2026</div>

  <script src="popup.js"></script>
</body>
</html>
